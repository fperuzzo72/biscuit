name: Compile Release Candidate
on:
  workflow_dispatch:
jobs:
  build-release-candidate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Python
        run: sudo apt-get install -y python3 python3-pip
      - name: Install PlatformIO
        run: pip3 install -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
      - name: Build
        run: pio run -e gh_release_rc
      - name: Create Release
        run: |
          gh release create "biscuit-$(date +%Y%m%d-%H%M%S)" \
            .pio/build/gh_release_rc/bootloader.bin \
            .pio/build/gh_release_rc/firmware.bin \
            .pio/build/gh_release_rc/partitions.bin \
            --title "Biscuit RC Build" \
            --notes "Automated build" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
